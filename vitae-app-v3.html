::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;-ms-overflow-style:none;}
input,button,textarea{font-family:'Inter',sans-serif;}
button{cursor:pointer;}
.press:active{transform:scale(0.96);transition:transform 0.1s;}
.slide-in{animation:slideIn 0.22s cubic-bezier(.25,.46,.45,.94) both;}
@keyframes slideIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn 0.2s ease both;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:0 0 32px;animation:sheetUp 0.25s cubic-bezier(.25,.46,.45,.94);}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.notif-panel{background:#fff;border-radius:0 0 24px 24px;width:100%;max-width:430px;animation:panelDown 0.22s cubic-bezier(.25,.46,.45,.94);}
@keyframes panelDown{from{transform:translateY(-20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pill{display:inline-flex;align-items:center;justify-content:center;border-radius:99px;font-weight:700;}

      </button>
      <button onClick={()=>onNext('Sarah')} style={{background:'none',border:'none',color:G4,marginTop:16,fontSize:14}}>Skip for now</button>
    </div>
  );
}

            </button>
            <button onClick={onProfile} className="press"
              style={{width:42,height:42,borderRadius:'50%',background:'rgba(255,255,255,0.2)',border:'none',
                display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>

          </div>
          <p style={{fontSize:12,color:G4}}>{applied} out of {Math.max(total,20)} application tasks completed</p>
        </div>

        {/* Recent applications — directly below progress bar per Figma */}
        <div style={{background:W,borderRadius:20,padding:'18px 20px',boxShadow:'0 2px 14px rgba(0,0,0,0.07)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>

                  <p style={{fontSize:11,color:G4,marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{app.title}</p>

              {l:'Interviews',v:interviews,e:'🤝'},
              {l:'Offers',v:offers,e:'✅'},
              {l:'Rejected',v:rejected,e:'❌'},

              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
const StatTile=({icon,label,value,sub})=>(

/* ══════════════════════════════════════════
   EXPLORE SCREEN
══════════════════════════════════════════ */
function ExploreScreen({savedIds,setSavedIds,applications,setApplications,studyLevel,savedSectors}){
  const [search,setSearch]=useState('');
  const [activeRoles,setActiveRoles]=useState([]);
  const [activeSectors,setActiveSectors]=useState([]);
  const [page,setPage]=useState(1);
  const [showFilter,setShowFilter]=useState(false);
  const [selectedOpp,setSelectedOpp]=useState(null);
  const PER=3;

  const filtered=useMemo(()=>OPPORTUNITIES.filter(o=>{
    const q=search.toLowerCase();
    const mQ=!q||o.title.toLowerCase().includes(q)||o.company.toLowerCase().includes(q)||o.location.toLowerCase().includes(q)||o.role.toLowerCase().includes(q);
    const mR=activeRoles.length===0||activeRoles.includes(o.role);
    const mS=activeSectors.length===0||activeSectors.some(s=>o.sector.includes(s));
    return mQ&&mR&&mS;
  }),[search,activeRoles,activeSectors]);

  const pages=Math.ceil(filtered.length/PER);
  const paginated=filtered.slice((page-1)*PER,page*PER);
  const toggleSave=id=>setSavedIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const apply=opp=>{
    if(!applications.find(a=>a.id===opp.id))setApplications(p=>[...p,{...opp,status:'applied',appliedDate:new Date().toLocaleDateString()}]);
    setSelectedOpp(null);
  };

  const anyFilter=activeRoles.length>0||activeSectors.length>0;

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',background:BG,overflow:'hidden'}}>
      <div style={{padding:'8px 20px 10px',flexShrink:0}}>
        <h1 style={{fontSize:26,fontWeight:800,color:G1}}>Explore</h1>
        <p style={{fontSize:13,color:G4,marginTop:2,marginBottom:12}}>Opportunities · {filtered.length} roles found</p>
        <SearchInput placeholder="Search roles, companies, locations…" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
        <div style={{display:'flex',gap:8,marginTop:10,overflowX:'auto',paddingBottom:2}}>
          <button onClick={()=>setShowFilter(true)} className="press"
            style={{display:'flex',alignItems:'center',gap:6,padding:'7px 13px',borderRadius:20,
              border:`1.5px solid ${anyFilter?P:G5}`,background:anyFilter?PL:W,
              fontSize:13,fontWeight:600,color:anyFilter?P:G2,flexShrink:0}}>
            <FilterIco s={13} c={anyFilter?P:G3}/> Filter {anyFilter?`(${activeRoles.length+activeSectors.length})`:''} <ChevD s={13} c={anyFilter?P:G3}/>
          </button>
          {ROLE_FILTERS.slice(0,4).map(r=>(
            <Chip key={r} label={r} active={activeRoles.includes(r)} small
              onClick={()=>{setActiveRoles(p=>p.includes(r)?p.filter(x=>x!==r):[...p,r]);setPage(1);}}/>
          ))}
        </div>
        {anyFilter&&(
          <button onClick={()=>{setActiveRoles([]);setActiveSectors([]);}} style={{background:'none',border:'none',color:P,fontSize:12,fontWeight:600,marginTop:6,padding:0}}>
            Clear all filters ×
          </button>
        )}
      </div>

      <div className="scroll-area" style={{padding:'0 16px 8px'}}>
        <div style={{display:'flex',flexDirection:'column',gap:10,paddingBottom:8}}>
          {paginated.map(opp=>{
            const isApplied=applications.some(a=>a.id===opp.id);
            return(
              <div key={opp.id} style={{background:W,borderRadius:20,padding:'16px',boxShadow:'0 2px 10px rgba(0,0,0,0.06)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div style={{flex:1,marginRight:8}}>
                    <p style={{fontSize:12,fontWeight:700,color:P,marginBottom:3}}>{opp.company}</p>
                    <h3 style={{fontSize:14,fontWeight:700,color:G1,lineHeight:1.3}}>{opp.title}</h3>
                  </div>
                  <button onClick={()=>toggleSave(opp.id)} className="press" style={{background:'none',border:'none',padding:4,flexShrink:0}}>
                    <BookmarkIco filled={savedIds.includes(opp.id)} s={22}/>
                  </button>
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
                  <div style={{display:'flex',alignItems:'center',gap:4}}><LocationIco s={12}/><span style={{fontSize:12,color:G4}}>{opp.location}</span></div>
                  <div style={{display:'flex',alignItems:'center',gap:4}}><span style={{fontSize:11}}>🎓</span><span style={{fontSize:12,color:G4}}>{opp.type}</span></div>
                  <div style={{display:'flex',alignItems:'center',gap:4}}><TagIco s={12}/><span style={{fontSize:12,color:G4}}>{opp.role}</span></div>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{display:'flex',alignItems:'center',gap:4}}><ClockIco s={12}/><span style={{fontSize:12,color:G4}}>{opp.deadline}</span></div>
                  {isApplied?(
                    <span style={{fontSize:12,fontWeight:700,padding:'7px 14px',borderRadius:12,background:'#dcfce7',color:'#15803d'}}>Applied ✓</span>
                  ):(
                    <button onClick={()=>setSelectedOpp(opp)} className="press"
                      style={{display:'flex',alignItems:'center',gap:5,background:P,color:W,border:'none',
                        borderRadius:12,padding:'8px 16px',fontSize:12,fontWeight:700,boxShadow:`0 3px 10px ${P}44`}}>
                      Apply <ArrowUp s={14} c={W}/>
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {/* Pagination */}
        {pages>1&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'8px 0 12px'}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1} className="press"
                style={{display:'flex',alignItems:'center',gap:3,padding:'7px 12px',borderRadius:10,
                  border:`1.5px solid ${G5}`,background:W,fontSize:13,fontWeight:600,color:page===1?G5:G2}}>
                <ChevL s={14}/> Prev
              </button>
              {Array.from({length:Math.min(6,pages)},(_,i)=>(
                <button key={i+1} onClick={()=>setPage(i+1)} className="press"
                  style={{width:30,height:30,borderRadius:8,border:'none',fontSize:12,fontWeight:700,
                    background:page===i+1?P:G6,color:page===i+1?W:G3}}>
                  {i+1}
                </button>
              ))}
              {pages>6&&<span style={{color:G4,fontSize:12}}>…{pages}</span>}
              <button onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={page===pages} className="press"
                style={{display:'flex',alignItems:'center',gap:3,padding:'7px 12px',borderRadius:10,
                  border:`1.5px solid ${G5}`,background:W,fontSize:13,fontWeight:600,color:page===pages?G5:G2}}>
                Next <ChevR s={14}/>
              </button>
            </div>
            <p style={{fontSize:11,color:G4}}>Page {page} of {pages} · {filtered.length} results</p>
          </div>
        )}
      </div>

      {/* Filter sheet */}
      {showFilter&&(
        <div className="sheet-overlay" onClick={()=>setShowFilter(false)}>
          <div className="sheet fade-in" style={{maxHeight:'80vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:'20px 20px 0'}}>
              <DragHandle/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <h3 style={{fontWeight:800,fontSize:17,color:G1}}>Filter Opportunities</h3>
                <button onClick={()=>{setActiveRoles([]);setActiveSectors([]);}} style={{background:'none',border:'none',color:P,fontSize:13,fontWeight:600}}>Clear All</button>
              </div>
              <p style={{fontSize:11,fontWeight:700,color:G4,letterSpacing:'0.07em',marginBottom:10}}>ROLE TYPE</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:20}}>
                {ROLE_FILTERS.map(r=>(
                  <Chip key={r} label={r} active={activeRoles.includes(r)} small
                    onClick={()=>setActiveRoles(p=>p.includes(r)?p.filter(x=>x!==r):[...p,r])}/>
                ))}
              </div>
              <p style={{fontSize:11,fontWeight:700,color:G4,letterSpacing:'0.07em',marginBottom:10}}>SECTOR</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:24}}>
                {['Finance','Healthcare & Life Sciences'].map(s=>(
                  <Chip key={s} label={s} active={activeSectors.includes(s)} small
                    onClick={()=>setActiveSectors(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s])}/>
                ))}
              </div>
              <button onClick={()=>setShowFilter(false)} className="press"
                style={{width:'100%',background:P,color:W,border:'none',borderRadius:14,padding:'14px',fontSize:15,fontWeight:700,marginBottom:4}}>
                Apply Filters
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Apply sheet */}
      {selectedOpp&&(
        <div className="sheet-overlay" onClick={()=>setSelectedOpp(null)}>
          <div className="sheet fade-in" onClick={e=>e.stopPropagation()}>
            <div style={{padding:'20px 20px 0'}}>
              <DragHandle/>
              <div style={{display:'flex',alignItems:'center',gap:12,paddingBottom:14,borderBottom:`1px solid ${G5}`,marginBottom:14}}>
                <div style={{width:44,height:44,background:PL,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>🏢</div>
                <div>
                  <p style={{fontWeight:700,fontSize:15,color:G1}}>{selectedOpp.company}</p>
                  <p style={{fontSize:13,color:G3}}>{selectedOpp.role} · {selectedOpp.type}</p>
                </div>
              </div>
              <div style={{background:G6,borderRadius:14,padding:'12px 14px',marginBottom:14}}>
                {[{l:'Role',v:selectedOpp.title},{l:'Location',v:selectedOpp.location},{l:'Deadline',v:selectedOpp.deadline},{l:'Sector',v:selectedOpp.sector}].map(({l,v})=>(
                  <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:`1px solid ${G5}`}}>
                    <span style={{fontSize:12,color:G4}}>{l}</span><span style={{fontSize:12,color:G1,fontWeight:600}}>{v}</span>
                  </div>
                ))}
              </div>
              <textarea placeholder="Add notes before applying..." style={{width:'100%',minHeight:68,background:G6,border:'none',borderRadius:12,padding:'10px 12px',fontSize:13,color:G2,resize:'none',outline:'none',marginBottom:14}}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:4}}>
                <button onClick={()=>setSelectedOpp(null)} className="press" style={{background:G6,border:'none',borderRadius:12,padding:'13px',fontSize:14,fontWeight:600,color:G2}}>Cancel</button>
                <button onClick={()=>apply(selectedOpp)} className="press" style={{background:P,color:W,border:'none',borderRadius:12,padding:'13px',fontSize:14,fontWeight:700}}>Apply Now</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   CALENDAR SCREEN
══════════════════════════════════════════ */
const DAYS_S=['Mo','Tu','We','Th','Fr','Sa','Su'];
const MONTHS_L=['January','February','March','April','May','June','July','August','September','October','November','December'];

function CalendarScreen({applications}){
  const today=new Date();
  const [vd,setVd]=useState({y:today.getFullYear(),m:today.getMonth()});
  const [sel,setSel]=useState(today.getDate());
  const [events,setEvents]=useState(CALENDAR_EVENTS);

  const dim=new Date(vd.y,vd.m+1,0).getDate();
  const fdow=(new Date(vd.y,vd.m,1).getDay()+6)%7;
  const selStr=`${MONTHS_L[vd.m].slice(0,3)} ${sel}`;
  const dayEvs=events.filter(e=>e.date===selStr);

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',background:BG,overflow:'hidden'}}>
      <div style={{padding:'8px 20px 0',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <h1 style={{fontSize:26,fontWeight:800,color:G1}}>Calendar</h1>
          <button className="press" style={{display:'flex',alignItems:'center',gap:5,padding:'8px 14px',borderRadius:12,background:P,border:'none',color:W,fontSize:13,fontWeight:700}}>
            <Plus s={14}/> Add
          </button>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <button onClick={()=>setVd(v=>v.m===0?{y:v.y-1,m:11}:{...v,m:v.m-1})} className="press" style={{background:G6,border:'none',borderRadius:10,padding:'7px 10px',display:'flex'}}><ChevL s={16}/></button>
          <span style={{fontWeight:700,fontSize:15,color:G1}}>{MONTHS_L[vd.m]} {vd.y}</span>
          <button onClick={()=>setVd(v=>v.m===11?{y:v.y+1,m:0}:{...v,m:v.m+1})} className="press" style={{background:G6,border:'none',borderRadius:10,padding:'7px 10px',display:'flex'}}><ChevR s={16}/></button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:4}}>
          {DAYS_S.map(d=><div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,color:G4,padding:'4px 0'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:14}}>
          {Array.from({length:fdow},(_,i)=><div key={`e${i}`}/>)}
          {Array.from({length:dim},(_,i)=>{
            const day=i+1;
            const isToday=day===today.getDate()&&vd.m===today.getMonth()&&vd.y===today.getFullYear();
            const isSel=day===sel;
            const ds=`${MONTHS_L[vd.m].slice(0,3)} ${day}`;
            const hasEv=events.some(e=>e.date===ds);
            return(
              <button key={day} onClick={()=>setSel(day)} className="press"
                style={{aspectRatio:'1',borderRadius:10,border:'none',fontSize:13,fontWeight:isSel||isToday?700:500,
                  background:isSel?P:isToday?PL:'transparent',color:isSel?W:isToday?P:G2,
                  display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
                {day}
                {hasEv&&<div style={{width:4,height:4,borderRadius:99,background:isSel?'rgba(255,255,255,0.7)':P}}/>}
              </button>
            );
          })}
        </div>
      </div>

      <div className="scroll-area" style={{padding:'0 16px 16px'}}>
        <p style={{fontSize:12,fontWeight:700,color:G4,marginBottom:8}}>{selStr} · {dayEvs.length} events</p>
        {dayEvs.length===0?(
          <div style={{textAlign:'center',padding:'24px 0',color:G4}}>
            <span style={{fontSize:32,display:'block',marginBottom:6}}>📅</span>
            <p style={{fontSize:13}}>No events on this day</p>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {dayEvs.map(ev=>(
              <div key={ev.id} style={{background:ev.color||G6,borderRadius:18,padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:44,height:44,background:'rgba(255,255,255,0.7)',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🏢</div>
                <div>
                  <p style={{fontSize:12,color:G4,marginBottom:1}}>{ev.company}</p>
                  <p style={{fontWeight:700,fontSize:16,color:G1}}>{ev.title}</p>
                  <p style={{fontSize:12,color:G3,marginTop:2}}>{ev.time}</p>
                </div>
              </div>
            ))}
          </div>
        )}
        {applications.length>0&&(
          <>
            <p style={{fontSize:12,fontWeight:700,color:G4,marginTop:18,marginBottom:8}}>Upcoming Deadlines</p>
            {applications.slice(0,3).map(app=>(
              <div key={app.id} style={{background:W,borderRadius:14,padding:'11px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,boxShadow:'0 1px 6px rgba(0,0,0,0.05)'}}>
                <div>
                  <p style={{fontSize:13,fontWeight:700,color:G1}}>{app.company}</p>
                  <p style={{fontSize:11,color:G4}}>{app.title.slice(0,32)}{app.title.length>32?'…':''}</p>
                </div>
                <span style={{fontSize:11,fontWeight:600,color:P,background:PL,padding:'4px 10px',borderRadius:20}}>{app.deadline}</span>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   NEWS SCREEN
══════════════════════════════════════════ */
function NewsScreen({savedSectors}){
  const [search,setSearch]=useState('');
  const [activeSector,setActiveSector]=useState(null);
  const [selectedArticle,setSelectedArticle]=useState(null);

  const NEWS_SECTORS=['All','Healthcare','Technology','Finance','Regulatory','Careers'];

  const filtered=NEWS_ARTICLES.filter(a=>{
    const q=search.toLowerCase();
    const mQ=!q||a.title.toLowerCase().includes(q)||a.summary.toLowerCase().includes(q)||a.company.toLowerCase().includes(q);
    const mS=!activeSector||activeSector==='All'||a.sector===activeSector;
    return mQ&&mS;
  });

  const grads=[
    'linear-gradient(135deg,#1a2744 0%,#1e1b4b 100%)',
    'linear-gradient(135deg,#064e3b 0%,#065f46 100%)',
    'linear-gradient(135deg,#1c1917 0%,#292524 100%)',
    'linear-gradient(135deg,#4a1942 0%,#6b21a8 100%)',
    'linear-gradient(135deg,#0c4a6e 0%,#0e7490 100%)',
    'linear-gradient(135deg,#3b1f0a 0%,#78350f 100%)',
    'linear-gradient(135deg,#14532d 0%,#166534 100%)',
    'linear-gradient(135deg,#1e1b4b 0%,#312e81 100%)',
    'linear-gradient(135deg,#4c0519 0%,#9f1239 100%)',
    'linear-gradient(135deg,#0f172a 0%,#1e293b 100%)',
    'linear-gradient(135deg,#1a1a2e 0%,#16213e 100%)',
    'linear-gradient(135deg,#0d3024 0%,#064e3b 100%)',
  ];

  const sectorColor={Healthcare:'#10b981',Technology:'#3b82f6',Finance:'#f59e0b',Regulatory:'#8b5cf6',Careers:'#ec4899'};

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',background:BG,overflow:'hidden'}}>
      <div style={{padding:'8px 20px 10px',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div>
            <h1 style={{fontSize:26,fontWeight:800,color:G1}}>Industry News</h1>
            <p style={{fontSize:13,color:G4,marginTop:2}}>{filtered.length} articles</p>
          </div>
        </div>
        <SearchInput placeholder="Search articles, companies, topics…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <div style={{display:'flex',gap:8,marginTop:10,overflowX:'auto',paddingBottom:2}}>
          {NEWS_SECTORS.map(s=>(
            <Chip key={s} label={s} active={activeSector===s||(s==='All'&&!activeSector)} small
              onClick={()=>setActiveSector(s==='All'?null:s)}/>
          ))}
        </div>
      </div>

      <div className="scroll-area" style={{padding:'0 16px 16px'}}>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {filtered.map((article,i)=>(
            <button key={article.id} onClick={()=>setSelectedArticle(article)} className="press"
              style={{background:W,borderRadius:20,overflow:'hidden',boxShadow:'0 2px 10px rgba(0,0,0,0.06)',border:'none',textAlign:'left',width:'100%'}}>
              <div style={{height:140,background:grads[i%grads.length],position:'relative',overflow:'hidden',display:'flex',alignItems:'flex-end',padding:'0 16px 14px'}}>
                <div style={{position:'absolute',top:12,right:14}}>
                  <span style={{fontSize:10,fontWeight:700,padding:'4px 10px',borderRadius:20,
                    background:sectorColor[article.sector]||P,color:W,letterSpacing:'0.05em'}}>
                    {article.sector.toUpperCase()}
                  </span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:28,height:28,background:'rgba(255,255,255,0.15)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🏢</div>
                  <span style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,0.85)'}}>{article.company}</span>
                </div>
              </div>
              <div style={{padding:'12px 16px 14px'}}>
                <h3 style={{fontSize:14,fontWeight:700,color:G1,lineHeight:1.4,marginBottom:6}}>{article.title}</h3>
                <p style={{fontSize:12,color:G3,lineHeight:1.5,marginBottom:10,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{article.summary}</p>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:11,fontWeight:600,color:G3}}>{article.source}</span>
                  <div style={{display:'flex',alignItems:'center',gap:4}}>
                    <ClockIco s={12}/><span style={{fontSize:11,color:G4}}>{article.time}</span>
                  </div>
                </div>
              </div>
            </button>
          ))}
        </div>
      </div>

      {/* Article detail */}
      {selectedArticle&&(
        <div className="sheet-overlay" onClick={()=>setSelectedArticle(null)}>
          <div className="sheet fade-in" style={{maxHeight:'88vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:'20px 20px 0'}}>
              <DragHandle/>
              <div style={{background:grads[NEWS_ARTICLES.indexOf(selectedArticle)%grads.length],borderRadius:18,padding:'20px',marginBottom:18,position:'relative',overflow:'hidden'}}>
                <span style={{position:'absolute',top:12,right:14,fontSize:10,fontWeight:700,padding:'4px 10px',borderRadius:20,background:sectorColor[selectedArticle.sector]||P,color:W,letterSpacing:'0.05em'}}>{selectedArticle.sector.toUpperCase()}</span>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <span style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,0.8)'}}>{selectedArticle.company}</span>
                </div>
                <h2 style={{fontSize:18,fontWeight:800,color:W,lineHeight:1.3}}>{selectedArticle.title}</h2>
              </div>
              <p style={{fontSize:14,color:G2,lineHeight:1.7,marginBottom:14}}>{selectedArticle.summary} Further details are expected to be released in official communications over the coming weeks, with analysts paying close attention to the broader implications for the sector.</p>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderTop:`1px solid ${G5}`,marginBottom:16}}>
                <span style={{fontSize:13,fontWeight:600,color:G2}}>{selectedArticle.source}</span>
                <span style={{fontSize:12,color:G4}}>{selectedArticle.time}</span>
              </div>
              <button onClick={()=>setSelectedArticle(null)} className="press"
                style={{width:'100%',background:G6,border:'none',borderRadius:12,padding:'14px',fontSize:14,fontWeight:600,color:G2}}>
                Close
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
function App(){
  // flow: login | onboard1 | onboard2 | onboard3_study | onboard4_sectors | app
  const [flow,setFlow]=useState('login');
  const [userName,setUserName]=useState('Sarah');
  const [studyLevel,setStudyLevel]=useState('undergrad');
  const [savedSectors,setSavedSectors]=useState([]);
  const [tab,setTab]=useState('dashboard');
  const [applications,setApplications]=useState([]);
  const [savedIds,setSavedIds]=useState([]);
  const [showNotifs,setShowNotifs]=useState(false);
  const [showProfile,setShowProfile]=useState(false);

  const isWide=window.innerWidth>440;

  const screens={
    dashboard:<DashboardScreen userName={userName} applications={applications} savedIds={savedIds}
      studyLevel={studyLevel} savedSectors={savedSectors}
      onBell={()=>{setShowNotifs(v=>!v);setShowProfile(false);}}
      onProfile={()=>{setShowProfile(true);setShowNotifs(false);}}/>,
    applications:<ApplicationsScreen applications={applications} setApplications={setApplications} setTab={setTab}/>,
    explore:<ExploreScreen savedIds={savedIds} setSavedIds={setSavedIds} applications={applications}
      setApplications={setApplications} studyLevel={studyLevel} savedSectors={savedSectors}/>,
    calendar:<CalendarScreen applications={applications}/>,
    news:<NewsScreen savedSectors={savedSectors}/>,
  };

  return(
    <div style={{minHeight:'100vh',background:'#ddd8f5',display:'flex',alignItems:'center',justifyContent:'center',padding:8}}>
      <div style={{width:'100%',maxWidth:430,background:BG,display:'flex',flexDirection:'column',
        height:'min(900px,100vh)',position:'relative',overflow:'hidden',
        borderRadius:isWide?44:0,boxShadow:isWide?'0 32px 80px rgba(0,0,0,0.22)':'none'}}>

        <StatusBar/>

        {/* ── ONBOARDING FLOWS ── */}
        {flow==='login'&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <LoginScreen onLogin={e=>{
              const n=e.split('@')[0].replace(/[^a-zA-Z]/g,' ').split(' ')[0];
              setUserName(n.charAt(0).toUpperCase()+n.slice(1));
              setFlow('onboard1');
            }}/>
          </div>
        )}
        {flow==='onboard1'&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <OnboardingWelcome onStart={()=>setFlow('onboard2')}/>
          </div>
        )}
        {flow==='onboard2'&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <OnboardingName onNext={n=>{setUserName(n);setFlow('onboard3_study');}}/>
          </div>
        )}
        {flow==='onboard3_study'&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <OnboardingStudyLevel onNext={s=>{setStudyLevel(s);setFlow('onboard4_sectors');}}/>
          </div>
        )}
        {flow==='onboard4_sectors'&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <OnboardingSectors onNext={s=>{setSavedSectors(s);setFlow('app');}}/>
          </div>
        )}

        {/* ── MAIN APP ── */}
        {flow==='app'&&(
          <>
            {/* Notification panel overlay (below header) */}
            {showNotifs&&(
              <div style={{position:'absolute',top:50,left:0,right:0,zIndex:150}}>
                <NotificationsPanel onClose={()=>setShowNotifs(false)} savedSectors={savedSectors} studyLevel={studyLevel}/>
              </div>
            )}

            {/* Dismiss overlay for notifs */}
            {showNotifs&&(
              <div onClick={()=>setShowNotifs(false)}
                style={{position:'absolute',inset:0,zIndex:140,background:'rgba(0,0,0,0.2)'}}/>
            )}

            {/* Profile sheet */}
            {showProfile&&(
              <ProfilePanel
                onClose={()=>setShowProfile(false)}
                userName={userName}
                studyLevel={studyLevel}
                setStudyLevel={setStudyLevel}
                savedSectors={savedSectors}
                setSavedSectors={setSavedSectors}
                onLogout={()=>{setShowProfile(false);setFlow('login');setApplications([]);setSavedIds([]);}}
              />
            )}

            <div key={tab} style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
              {screens[tab]}
            </div>
            <NavBar tab={tab} setTab={t=>{setTab(t);setShowNotifs(false);}}/>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
